type FingerprintCluster {
  members: [ClusterMember!]!
  """True when expansion hit the per-cluster scene cap; bulk move/delete
  should be disabled."""
  poisoned: Boolean!
}

type ClusterMember {
  hash: FingerprintHash!
  scene_submissions: [ClusterSceneSubmission!]!
}

type ClusterSceneSubmission {
  scene: Scene!
  submissions: Int!
  reports: Int!
  durations: [DurationCount!]!
  linked_fingerprints: [ClusterOshash!]!
}

type DurationCount {
  duration: Int!
  count: Int!
}

type ClusterOshash {
  hash: FingerprintHash!
  submissions: Int!
  reports: Int!
}

input FingerprintClustersInput {
  scene_id: ID!
  distance: Int!
}

#import "../fragments/NotificationSceneFragment.gql"
#import "../fragments/NotificationEditFragment.gql"
#import "../fragments/CommentFragment.gql"

fragment NotificationCommentFragment on EditComment {
  ...CommentFragment
  edit {
    ...NotificationEditFragment
  }
}

query Notifications($input: QueryNotificationsInput!) {
  queryNotifications(input: $input) {
    count
    notifications {
      created
      read
      level
      data {
        __typename
        ... on FavoritePerformerScene {
          scene {
            ...NotificationSceneFragment
          }
        }
        ... on FavoritePerformerEdit {
          edit {
            ...NotificationEditFragment
          }
        }
        ... on FavoriteStudioScene {
          scene {
            ...NotificationSceneFragment
          }
        }
        ... on FavoriteStudioEdit {
          edit {
            ...NotificationEditFragment
          }
        }
        ... on CommentOwnEdit {
          comment {
            ...NotificationCommentFragment
          }
        }
        ... on CommentCommentedEdit {
          comment {
            ...NotificationCommentFragment
          }
        }
        ... on CommentVotedEdit {
          comment {
            ...NotificationCommentFragment
          }
        }
        ... on DownvoteOwnEdit {
          edit {
            ...NotificationEditFragment
          }
        }
        ... on FailedOwnEdit {
          edit {
            ...NotificationEditFragment
          }
        }
        ... on UpdatedEdit {
          edit {
            ...NotificationEditFragment
          }
        }
        ... on FingerprintedSceneEdit {
          edit {
            ...NotificationEditFragment
          }
        }
      }
    }
  }
}

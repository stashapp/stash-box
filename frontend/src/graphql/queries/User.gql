query User($name: String!) {
  findUser(username: $name) {
    id
    name
    email
    roles
    api_key
    api_calls
    invited_by {
      id
      name
    }
    invite_tokens
    invite_codes {
      id
      uses
      expires
    }
    vote_count {
      accept
      reject
      immediate_accept
      immediate_reject
      abstain
    }
    edit_count {
      immediate_accepted
      immediate_rejected
      accepted
      rejected
      failed
      canceled
      pending
      immediate_accepted_bot
      immediate_rejected_bot
      accepted_bot
      rejected_bot
      failed_bot
      canceled_bot
      pending_bot
    }
    notification_subscriptions
  }
}

query FingerprintClusters($input: FingerprintClustersInput!) {
  fingerprintClusters(input: $input) {
    id
    poisoned
    members {
      hash
      scene_submissions {
        submissions
        reports
        durations {
          duration
          count
        }
        scene {
          id
          title
          release_date
          deleted
          duration
          studio {
            name
          }
          performers {
            as
            performer {
              id
              name
              disambiguation
              deleted
            }
          }
        }
      }
      linked_oshashes {
        hash
        submissions
        reports
        scene {
          id
          title
        }
      }
    }
  }
}

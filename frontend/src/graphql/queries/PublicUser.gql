query PublicUser($name: String!) {
  findUser(username: $name) {
    id
    name
    vote_count {
      accept
      reject
      immediate_accept
      immediate_reject
      abstain
    }
    edit_count {
      immediate_accepted
      immediate_rejected
      accepted
      rejected
      failed
      canceled
      pending
      immediate_accepted_bot
      immediate_rejected_bot
      accepted_bot
      rejected_bot
      failed_bot
      canceled_bot
      pending_bot
    }
  }
}
